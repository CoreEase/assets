name: Update Currency Rates

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-rates:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run script
      run: python currency/update_rates.py
      continue-on-error: false
      
    - name: Check if file was created
      run: |
        if [ -f "currency/final_rates.json" ]; then
          echo "File created successfully"
          ls -la currency/final_rates.json
          cat currency/final_rates.json | head -20
        else
          echo "File not created!"
          exit 1
        fi
        
    - name: Commit and push if changed
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add currency/final_rates.json
        git diff --staged --quiet || git commit -m "Update currency rates [skip ci]"
        git push
